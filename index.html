<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jin's to do</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: #f5f6fa; color: #2d3436; padding: 24px;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    border-radius: 16px; padding: 28px 32px; color: #fff; margin-bottom: 24px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
  }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header .sub { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .header .next-exam {
    background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 10px; text-align: center;
  }
  .header .next-exam .days { font-size: 28px; font-weight: 700; }
  .header .next-exam .label { font-size: 13px; opacity: 0.85; }
  .header .exam-cards {
    display: flex; gap: 12px;
  }

  /* ── Phase Progress Bar ── */
  .phase-bar {
    background: #fff; border-radius: 12px; padding: 18px 24px; margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .phase-bar .label { font-size: 12px; color: #636e72; margin-bottom: 8px; }
  .phase-bar .track {
    display: flex; align-items: center; gap: 0; position: relative;
    height: 32px; background: #dfe6e9; border-radius: 16px; overflow: hidden;
  }
  .phase-bar .track .seg {
    flex: 1; height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: #636e72; position: relative; transition: 0.3s;
    border-right: 2px solid #fff;
  }
  .phase-bar .track .seg:last-child { border-right: none; }
  .phase-bar .track .seg.active { color: #fff; }
  .phase-bar .track .seg.p0 { background: #fdcb6e; }  /* 托业 */
  .phase-bar .track .seg.p1 { background: #a29bfe; }  /* CFA一级 */
  .phase-bar .track .seg.p2 { background: #74b9ff; }  /* BEC */
  .phase-bar .track .seg.p3 { background: #00cec9; }  /* CPA */
  .phase-bar .track .seg.p0.active, .phase-bar .track .seg.p1.active,
  .phase-bar .track .seg.p2.active, .phase-bar .track .seg.p3.active {
    font-weight: 700; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.5);
  }
  .phase-bar .track .seg.inactive { opacity: 0.35; }
  .phase-bar .marks {
    display: flex; margin-top: 6px; font-size: 11px; color: #636e72;
  }
  .phase-bar .marks span { flex: 1; text-align: center; white-space: nowrap; }

  /* ── Calendar Grid ── */
  .calendar-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px;
  }
  @media (max-width: 768px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .calendar-grid { grid-template-columns: 1fr; } }

  .month-card {
    background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .month-card.compact { padding: 10px; }
  .month-card .month-title {
    font-size: 14px; font-weight: 700; color: #2d3436; margin-bottom: 8px; text-align: center;
  }
  .month-card.compact .month-title { font-size: 12px; margin-bottom: 4px; }

  .weekday-row {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 2px;
  }
  .weekday-row span {
    text-align: center; font-size: 11px; color: #636e72; padding: 2px 0; font-weight: 500;
  }
  .compact .weekday-row span { font-size: 9px; }

  .days-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .day-cell {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 13px; border-radius: 6px; background: #f8f9fa; color: #b2bec3;
    position: relative; transition: 0.15s; cursor: default; line-height: 1.1; padding: 1px;
  }
  .compact .day-cell { font-size: 10px; border-radius: 3px; }

  .day-label {
    font-size: 7px; font-weight: 600; line-height: 1; margin-top: 1px; opacity: 0.9;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }
  .exam .day-label { color: #fff; }
  .reg-start .day-label { color: #0984e3; }

  .day-cell.today {
    background: #6c5ce7; color: #fff; font-weight: 700;
    box-shadow: 0 2px 8px rgba(108,92,231,0.3);
  }
  .day-cell.past {
    background: #e8f8f5; color: #00b894; font-weight: 600;
  }
  .day-cell.past::after {
    content: "✓"; position: absolute; font-size: 9px; top: 1px; right: 3px; color: #00b894;
  }
  .compact .day-cell.past::after { font-size: 7px; top: 0; right: 2px; }
  .day-cell.future { background: #f8f9fa; color: #b2bec3; }
  .day-cell.empty { background: transparent; }

  /* Key date markers */
  .day-cell.exam {
    background: #ff7675; color: #fff; font-weight: 700;
    box-shadow: 0 2px 6px rgba(255,118,117,0.35);
  }
  .day-cell.exam.past {
    background: #fab1a0; color: #fff;
  }
  .day-cell.exam::after { display: none; }
  .day-cell.reg-start {
    background: #74b9ff; color: #fff; font-weight: 600;
  }
  .day-cell.reg-end {
    background: #0984e3; color: #fff; font-weight: 600;
  }
  .day-cell.reg-period {
    background: #dfe6e9; color: #0984e3; font-weight: 500;
  }

  /* ── Bottom: Key Dates + Tracker ── */
  .bottom-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
  }
  @media (max-width: 640px) { .bottom-row { grid-template-columns: 1fr; } }

  .panel {
    background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .panel h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #2d3436; }

  .key-dates-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .key-dates-table th, .key-dates-table td {
    padding: 6px 8px; text-align: left; border-bottom: 1px solid #f1f2f6;
  }
  .key-dates-table th { font-weight: 600; color: #636e72; font-size: 11px; text-transform: uppercase; }
  .key-dates-table .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .tag-exam { background: #ffeaa7; color: #d63031; }
  .tag-reg { background: #dfe6e9; color: #0984e3; }
  .phase-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }
  .phase-dot.p0 { background:#fdcb6e; }
  .phase-dot.p1 { background:#a29bfe; }
  .phase-dot.p2 { background:#74b9ff; }
  .phase-dot.p3 { background:#00cec9; }

  .tracker-input {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px;
  }
  .tracker-input select, .tracker-input input {
    padding: 6px 10px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 13px; background: #fff;
  }
  .tracker-input button {
    padding: 6px 16px; background: #6c5ce7; color: #fff; border: none; border-radius: 8px;
    font-size: 13px; cursor: pointer; font-weight: 600;
  }
  .tracker-input button:hover { background: #5a4bd1; }
  .tracker-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tracker-table th, .tracker-table td {
    padding: 5px 8px; text-align: left; border-bottom: 1px solid #f1f2f6;
  }
  .tracker-table th { font-weight: 600; color: #636e72; font-size: 11px; }
  .tracker-total { margin-top: 8px; font-size: 14px; font-weight: 700; color: #6c5ce7; text-align: right; }

  /* ── Progress Bars ── */
  .progress-item { margin-bottom: 10px; }
  .progress-header {
    display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px;
  }
  .progress-header .name { font-weight: 600; color: #2d3436; }
  .progress-header .stats { color: #636e72; }
  .progress-track {
    width: 100%; height: 16px; background: #f1f2f6; border-radius: 8px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 8px; transition: width 0.4s ease; min-width: 0;
  }
  .progress-fill.c0 { background: linear-gradient(90deg, #fdcb6e, #e17055); }
  .progress-fill.c1 { background: linear-gradient(90deg, #a29bfe, #6c5ce7); }
  .progress-fill.c2 { background: linear-gradient(90deg, #74b9ff, #0984e3); }
  .progress-fill.c3 { background: linear-gradient(90deg, #00cec9, #00b894); }

  /* ── Data Import ── */
  .import-area { margin-top: 14px; border-top: 1px solid #f1f2f6; padding-top: 12px; }
  .import-toggle {
    font-size: 12px; color: #636e72; cursor: pointer; text-decoration: underline dotted;
  }
  .import-toggle:hover { color: #6c5ce7; }
  .import-box { display: none; margin-top: 8px; }
  .import-box.show { display: block; }
  .import-box textarea {
    width: 100%; height: 80px; padding: 8px; border: 1px solid #dfe6e9; border-radius: 8px;
    font-size: 11px; font-family: monospace; resize: vertical;
  }
  .import-box button {
    margin-top: 6px; padding: 4px 14px; background: #00b894; color: #fff; border: none;
    border-radius: 6px; font-size: 12px; cursor: pointer;
  }
  .import-box button:hover { background: #00a381; }
  .import-msg { font-size: 12px; margin-top: 6px; }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    font-size: 12px; color: #636e72; margin-bottom: 24px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot {
    display: inline-block; width: 14px; height: 14px; border-radius: 4px;
  }
  .legend-dot.red { background: #ff7675; }
  .legend-dot.blue { background: #74b9ff; }
  .legend-dot.purple { background: #6c5ce7; }
  .legend-dot.green { background: #00b894; }

  /* ── TOEIC Plan Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 1000; justify-content: center; align-items: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-content {
    background: #fff; border-radius: 16px; max-width: 760px; width: 100%;
    max-height: 90vh; overflow-y: auto; padding: 28px; position: relative;
  }
  .modal-close {
    position: sticky; top: 0; float: right; width: 32px; height: 32px;
    background: #ff7675; color: #fff; border: none; border-radius: 50%;
    font-size: 18px; cursor: pointer; z-index: 1; display: flex;
    align-items: center; justify-content: center;
  }
  .modal-close:hover { background: #d63031; }
  .modal-images {
    display: flex; flex-direction: column; gap: 12px; align-items: center;
    clear: both;
  }
  .modal-images img {
    width: 100%; max-width: 540px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
</style>
</head>
<body>
<div class="container" id="app">

  <!-- ─── Header ─── -->
  <div class="header">
    <div>
      <h1>📚 Jin's to do</h1>
      <div class="sub" id="todayDisplay">加载中...</div>
    </div>
    <div class="exam-cards">
      <div class="next-exam">
        <div class="days" id="nextExamDays1">—</div>
        <div class="label" id="nextExamLabel1">距下次考试</div>
      </div>
      <div class="next-exam">
        <div class="days" id="nextExamDays2">—</div>
        <div class="label" id="nextExamLabel2">距第二次考试</div>
      </div>
    </div>
  </div>

  <!-- ─── Phase Bar ─── -->
  <div class="phase-bar">
    <div class="label">当前进度</div>
    <div class="track" id="phaseTrack"></div>
    <div class="marks" id="phaseMarks"></div>
  </div>

  <!-- ─── Legend ─── -->
  <div class="legend">
    <span class="legend-item"><span class="legend-dot purple"></span> 今天</span>
    <span class="legend-item"><span class="legend-dot green"></span> 已过 ✓</span>
    <span class="legend-item"><span class="legend-dot red"></span> 考试日</span>
    <span class="legend-item"><span class="legend-dot blue"></span> 报名期</span>
  </div>

  <!-- ─── Calendar ─── -->
  <div class="calendar-grid" id="calendarGrid"></div>

  <!-- ─── Bottom Row ─── -->
  <div class="bottom-row">
    <div class="panel">
      <h3>📌 关键日期</h3>
      <table class="key-dates-table" id="keyDatesTable"></table>
    </div>
    <div class="panel">
      <h3>📝 今日复习记录</h3>
      <div class="tracker-input">
        <select id="trackerSubject">
          <option value="托业TOEIC">托业TOEIC</option>
          <option value="CFA一级">CFA一级</option>
          <option value="BEC高级">BEC高级</option>
          <option value="CPA">CPA</option>
        </select>
        <input type="number" id="trackerHours" min="0.5" max="24" step="0.5" value="1" style="width:60px">
        <span>小时</span>
        <button onclick="addTrackerEntry()">记录</button>
      </div>
      <table class="tracker-table" id="trackerTable"></table>
      <div class="tracker-total" id="trackerTotal">今日总计: 0h</div>

      <h3 style="margin-top:18px; font-size:15px; font-weight:700;">📊 累计进度</h3>
      <div id="progressBars"></div>

      <div class="import-area">
        <span class="import-toggle" onclick="toggleImport()">📥 导入同步数据</span>
        <span style="font-size:11px;color:#636e72;margin-left:8px;cursor:pointer" onclick="document.getElementById('importMsg').innerHTML='<span style=\"color:#6c5ce7\">☁️ 正在同步...</span>';syncToCloud()">📤 推送到云端</span>
        <div class="import-box" id="importBox">
          <textarea id="importData" placeholder="在此粘贴我给你的数据块..."></textarea>
          <button onclick="importData()">导入</button>
          <div class="import-msg" id="importMsg"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ─── TOEIC Plan Modal ─── -->
<div class="modal-overlay" id="toeicModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeToeicPlan()">✕</button>
    <h2 style="margin-bottom:12px;font-size:18px;font-weight:700">📋 60天托业备考计划</h2>
    <p style="color:#636e72;font-size:13px;margin-bottom:16px">
      2026.06.25 → 2026.08.23 &nbsp;|&nbsp; 目标 700分 &nbsp;|&nbsp; 总学时 300h
    </p>
    <div class="modal-images">
      <img src="img/toeic-schedule-1.jpg" alt="托业备考计划-封面" loading="lazy">
      <img src="img/toeic-schedule-2.jpg" alt="基础筑基期" loading="lazy">
      <img src="img/toeic-schedule-3.jpg" alt="专项强化期" loading="lazy">
      <img src="img/toeic-schedule-4.jpg" alt="冲刺模考期" loading="lazy">
    </div>
  </div>
</div>

<script>
// ─── Data ──────────────────────────────────────
const KEY_DATES = [
  // CFA level 1 registration windows
  { date: '2026-08-11', label: 'CFA一级报名截止(1期)', type: 'reg' },
  { date: '2026-11-11', label: '📝 CFA一级考试(1期)', type: 'exam' },
  { date: '2026-11-17', label: '📝 CFA一级考试(1期结束)', type: 'exam' },

  // 托业
  { date: '2026-07-27', label: '托业报名截止(1期)', type: 'reg' },
  { date: '2026-08-23', label: '📝 托业考试(1期)', type: 'exam' },
  { date: '2026-09-28', label: '托业报名截止(2期)', type: 'reg' },
  { date: '2026-10-25', label: '📝 托业考试(2期)', type: 'exam' },

  // CFA level 1 registration for 2027 Feb
  { date: '2026-11-05', label: 'CFA一级报名截止(2期)', type: 'reg' },
  { date: '2027-02-22', label: '📝 CFA一级考试(2期)', type: 'exam' },
  { date: '2027-02-28', label: '📝 CFA一级考试(2期结束)', type: 'exam' },

  // BEC
  { date: '2027-03-11', label: 'BEC报名开始', type: 'reg' },
  { date: '2027-05-22', label: '📝 BEC考试(预计)', type: 'exam' },

  // CPA
  { date: '2027-04-07', label: 'CPA报名开始', type: 'reg' },
  { date: '2027-04-30', label: 'CPA报名截止', type: 'reg' },
  { date: '2027-08-29', label: '📝 CPA考试', type: 'exam' },
];

const PHASES = [
  { label: '托业主攻', start: '2026-06-24', end: '2026-10-25', cls: 'p0' },
  { label: 'CFA一级',  start: '2026-10-26', end: '2027-02-28', cls: 'p1' },
  { label: 'BEC高级',  start: '2027-03-01', end: '2027-05-22', cls: 'p2' },
  { label: 'CPA',      start: '2027-05-23', end: '2027-08-29', cls: 'p3' },
];

const MONTH_RANGE = { start: {y:2026,m:6}, end: {y:2027,m:8} };

const EXAM_DATES = KEY_DATES.filter(d => d.type==='exam').map(d => d.date);
const REG_DATES = KEY_DATES.filter(d => d.type==='reg').map(d => d.date);
const REG_MAP = {};
KEY_DATES.filter(d=>d.type==='reg').forEach(d => { REG_MAP[d.date] = d.label; });

// Short labels for calendar cells
const DATE_SHORT = {};
KEY_DATES.forEach(d => {
  let s = '';
  if (d.label.includes('托业')) {
    const m = d.label.match(/(\d+)期/);
    const p = m ? '第' + m[1] + '期' : '';
    s = '托业' + p;
  }
  else if (d.label.includes('CFA')) {
    // Extract period from label like '(第2期)' or '(第3期)'
    const m = d.label.match(/(\d+)期/);
    const p = m ? '第' + m[1] + '期' : '';
    s = 'CFA' + p;
  }
  else if (d.label.includes('BEC')) s = 'BEC';
  else if (d.label.includes('CPA')) s = 'CPA';
  if (d.type === 'reg') s += '截止';
  else if (d.label.includes('结束')) s += '末';
  else s += '考试';
  DATE_SHORT[d.date] = s;
});

// Helper: date objects
function dObj(s) { return new Date(s + 'T00:00:00'); }
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const TODAY_STR = fmtDate(TODAY);

// ─── Header ────────────────────────────────────
function updateHeader() {
  document.getElementById('todayDisplay').textContent =
    `今天是 ${TODAY.getFullYear()}年${TODAY.getMonth()+1}月${TODAY.getDate()}日 星期${'日一二三四五六'[TODAY.getDay()]}`;

  // Get upcoming exams sorted by date
  const upcoming = EXAM_DATES
    .map(d => ({ date: dObj(d), label: KEY_DATES.find(k=>k.date===d)?.label || d }))
    .filter(e => e.date >= TODAY)
    .sort((a, b) => a.date - b.date);

  // First card: nearest exam
  if (upcoming[0]) {
    document.getElementById('nextExamDays1').textContent = daysBetween(TODAY, upcoming[0].date);
    document.getElementById('nextExamLabel1').textContent = `距 ${upcoming[0].label.replace('📝 ','')}`;
  } else {
    document.getElementById('nextExamDays1').textContent = '✓';
    document.getElementById('nextExamLabel1').textContent = '全部完成';
  }

  // Second card: CFA1期 countdown
  const cfa1Date = KEY_DATES.find(k => k.label.includes('CFA一级考试(1期)') && !k.label.includes('结束'));
  if (cfa1Date) {
    const dt = dObj(cfa1Date.date);
    const diff = daysBetween(TODAY, dt);
    if (diff >= 0) {
      document.getElementById('nextExamDays2').textContent = diff;
      document.getElementById('nextExamLabel2').textContent = `距 ${cfa1Date.label.replace('📝 ','')}`;
    } else {
      document.getElementById('nextExamDays2').textContent = '✓';
      document.getElementById('nextExamLabel2').textContent = 'CFA1期已过';
    }
  } else {
    document.getElementById('nextExamDays2').textContent = '—';
    document.getElementById('nextExamLabel2').textContent = '—';
  }
}

// ─── Phase Bar ─────────────────────────────────
function renderPhaseBar() {
  const track = document.getElementById('phaseTrack');
  const marks = document.getElementById('phaseMarks');

  let activeIdx = -1;
  for (let i = 0; i < PHASES.length; i++) {
    const s = dObj(PHASES[i].start), e = dObj(PHASES[i].end);
    if (TODAY >= s && TODAY <= e) { activeIdx = i; break; }
    if (i < PHASES.length - 1 && TODAY >= s && TODAY < dObj(PHASES[i+1].start)) { activeIdx = i; break; }
  }
  if (activeIdx === -1) activeIdx = PHASES.length - 1;

  track.innerHTML = PHASES.map((p, i) => {
    const active = i === activeIdx;
    const past = TODAY > dObj(p.end);
    const isToeic = p.label.includes('托业');
    const clickAttr = isToeic ? ' style="cursor:pointer" onclick="openToeicPlan()"' : '';
    return `<div class="seg ${p.cls} ${active?'active':''} ${past?'inactive':''}"${clickAttr}>${p.label}${isToeic ? ' 📋' : ''}</div>`;
  }).join('');

  // Show exam countdown instead of start dates
  marks.innerHTML = PHASES.map(p => {
    // Map phase label to its corresponding exam date
    let examLabel = '', emoji = '';
    if (p.label.includes('托业')) { examLabel = '托业考试(1期)'; emoji = '🎯'; }
    else if (p.label.includes('CFA')) { examLabel = 'CFA一级考试(1期)'; emoji = '📊'; }
    else if (p.label.includes('BEC')) { examLabel = 'BEC考试(预计)'; emoji = '🌍'; }
    else if (p.label.includes('CPA')) { examLabel = 'CPA考试'; emoji = '🧮'; }
    const kd = KEY_DATES.find(k => k.label.includes(examLabel));
    if (!kd) return `<span>—</span>`;
    const dt = dObj(kd.date);
    const diff = daysBetween(TODAY, dt);
    const days = diff < 0 ? '已过' : diff + '天';
    return `<span>${emoji}${days}</span>`;
  }).join('');
}

// ─── Calendar ──────────────────────────────────
function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  let html = '';

  const sy = MONTH_RANGE.start.y, sm = MONTH_RANGE.start.m;
  const ey = MONTH_RANGE.end.y, em = MONTH_RANGE.end.m;
  const totalMonths = (ey - sy) * 12 + (em - sm) + 1;

  for (let i = 0; i < totalMonths; i++) {
    const y = sy + Math.floor((sm - 1 + i) / 12);
    const m = ((sm - 1 + i) % 12) + 1;
    const compact = i >= 6;

    const firstDay = new Date(y, m - 1, 1);
    const lastDate = new Date(y, m, 0).getDate();
    const startDow = firstDay.getDay();

    html += `<div class="month-card ${compact?'compact':''}">`;
    html += `<div class="month-title">${y}年${m}月</div>`;

    html += '<div class="weekday-row">';
    '日一二三四五六'.split('').forEach(d => html += `<span>${d}</span>`);
    html += '</div>';

    html += '<div class="days-grid">';

    for (let e = 0; e < startDow; e++) html += '<div class="day-cell empty"></div>';

    for (let d = 1; d <= lastDate; d++) {
      const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dt = dObj(dateStr);
      const isToday = dateStr === TODAY_STR;
      const isPast = dt < TODAY;
      const isExam = EXAM_DATES.includes(dateStr);
      const isReg = REG_DATES.includes(dateStr);
      const isFuture = dt >= TODAY && !isToday;

      let cls = 'day-cell';
      if (isExam) cls += ' exam';
      if (isToday) cls += ' today';
      else if (isPast && !isExam) cls += ' past';
      else if (isFuture && !isExam) cls += ' future';
      if (isReg && !isExam) cls += ' reg-start';

      const shortLabel = DATE_SHORT[dateStr] || '';
      const labelHtml = shortLabel ? `<span class="day-label">${shortLabel}</span>` : '';
      const fullTitle = dateStr + (shortLabel ? ` — ${shortLabel.replace('考试','').replace('截止','')}${isExam?'考试':''}${isReg?'截止':''}` : '');

      html += `<div class="${cls}" title="${fullTitle}">${d}${labelHtml}</div>`;
    }

    html += '</div></div>';
  }

  grid.innerHTML = html;
}

// ─── Key Dates Table ────────────────────────────
function renderKeyDates() {
  const t = document.getElementById('keyDatesTable');
  const sorted = [...KEY_DATES].sort((a,b) => a.date.localeCompare(b.date));
  // Phase color mapping for key dates
  function phaseForLabel(label) {
    if (label.includes('托业')) return {ph: '托业', cls: 'p0'};
    if (label.includes('CFA')) return {ph: 'CFA', cls: 'p1'};
    if (label.includes('BEC')) return {ph: 'BEC高级', cls: 'p2'};
    if (label.includes('CPA')) return {ph: 'CPA', cls: 'p3'};
    return {ph: '', cls: ''};
  }
  t.innerHTML = `
    <tr><th>日期</th><th>事项</th><th>阶段</th><th>剩余</th></tr>
    ${sorted.map(d => {
      const dt = dObj(d.date);
      const diff = daysBetween(TODAY, dt);
      const remaining = diff < 0 ? '已过' : diff === 0 ? '今天!' : `${diff}天`;
      const tagCls = d.type === 'exam' ? 'tag-exam' : 'tag-reg';
      const tagLabel = d.type === 'exam' ? '考试' : '报名';
      const ph = phaseForLabel(d.label);
      const phaseHtml = ph.ph ? `<span class="phase-dot ${ph.cls}"></span>${ph.ph}` : '';
      return `<tr>
        <td style="white-space:nowrap">${d.date}</td>
        <td><span class="tag ${tagCls}">${tagLabel}</span> ${d.label}</td>
        <td style="font-size:12px">${phaseHtml}</td>
        <td style="font-weight:${diff>=0&&diff<=30?'700':'400'}; color:${diff<0?'#b2bec3':diff<=7?'#d63031':diff<=30?'#fdcb6e':'#636e72'}">${remaining}</td>
      </tr>`;
    }).join('')}
  `;
}

// ─── Study Tracker (localStorage) ──────────────
function getTrackerData() {
  try {
    const raw = localStorage.getItem('exam_tracker_' + TODAY_STR);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
function saveTrackerData(data) {
  localStorage.setItem('exam_tracker_' + TODAY_STR, JSON.stringify(data));
}
function renderTracker() {
  const data = getTrackerData();
  const t = document.getElementById('trackerTable');
  if (data.length === 0) {
    t.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#b2bec3;padding:12px">今天还没记录</td></tr>';
  } else {
    t.innerHTML = `
      <tr><th>科目</th><th>时长</th><th></th></tr>
      ${data.map((e, i) => `
        <tr>
          <td>${e.subject}</td>
          <td>${e.hours}h</td>
          <td><a href="#" onclick="deleteTrackerEntry(${i});return false" style="color:#ff7675;text-decoration:none;font-size:12px">✕</a></td>
        </tr>
      `).join('')}
    `;
  }
  const total = data.reduce((s, e) => s + e.hours, 0);
  document.getElementById('trackerTotal').textContent = `今日总计: ${total}h`;
}
function addTrackerEntry() {
  const subj = document.getElementById('trackerSubject').value;
  const hrs = parseFloat(document.getElementById('trackerHours').value) || 1;
  const data = getTrackerData();
  data.push({ subject: subj, hours: hrs });
  saveTrackerData(data);
  renderTracker();
  renderProgressBars();
  syncToCloud();
}
function deleteTrackerEntry(idx) {
  const data = getTrackerData();
  data.splice(idx, 1);
  saveTrackerData(data);
  renderTracker();
  renderProgressBars();
  syncToCloud();
}

// ─── Progress Bars ──
const PROGRESS_TARGETS = {
  '托业TOEIC': 300,
  'CFA一级': 350,
  'BEC高级': 300,
  'CPA': 1600,
};
const PROGRESS_COLORS = ['c0','c1','c2','c3'];

function getCumulativeHours() {
  const totals = {};
  for (const subj of Object.keys(PROGRESS_TARGETS)) totals[subj] = 0;

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('exam_tracker_')) continue;
    try {
      const entries = JSON.parse(localStorage.getItem(key));
      if (!Array.isArray(entries)) continue;
      for (const e of entries) {
        if (totals.hasOwnProperty(e.subject)) {
          totals[e.subject] += e.hours;
        }
      }
    } catch {}
  }
  return totals;
}

function renderProgressBars() {
  const container = document.getElementById('progressBars');
  const totals = getCumulativeHours();
  const subjects = Object.keys(PROGRESS_TARGETS);

  container.innerHTML = subjects.map((subj, i) => {
    const hours = totals[subj];
    const target = PROGRESS_TARGETS[subj];
    const pct = Math.min(100, Math.round((hours / target) * 100));
    return `
      <div class="progress-item">
        <div class="progress-header">
          <span class="name">${subj}</span>
          <span class="stats">${hours}h / ${target}h (${pct}%)</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill ${PROGRESS_COLORS[i]}" style="width:${pct}%"></div>
        </div>
      </div>
    `;
  }).join('');
}

// ─── Data Import ──
function toggleImport() {
  document.getElementById('importBox').classList.toggle('show');
}
function importData() {
  const raw = document.getElementById('importData').value.trim();
  const msg = document.getElementById('importMsg');
  try {
    const data = JSON.parse(raw);
    if (!Array.isArray(data)) throw new Error('格式错误，应为数组');
    let count = 0;
    for (const day of data) {
      if (!day.date || !Array.isArray(day.entries)) continue;
      localStorage.setItem('exam_tracker_' + day.date, JSON.stringify(day.entries));
      count += day.entries.length;
    }
    msg.innerHTML = `<span style="color:#00b894">✅ 成功导入 ${count} 条记录</span>`;
    renderTracker();
    renderProgressBars();
  } catch (e) {
    msg.innerHTML = `<span style="color:#ff7675">❌ 导入失败：${e.message}</span>`;
  }
}

// ─── Cloud Data Sync (auto read+write) ──
const CLOUD_DATA_URL = 'https://raw.githubusercontent.com/jinluo1993-ux/study-plan/main/data.json';
const GH_API_FILE = 'https://api.github.com/repos/jinluo1993-ux/study-plan/contents/data.json';
function getGhToken() { return localStorage.getItem('gh_token') || ''; }

async function loadCloudData() {
  try {
    const r = await fetch(CLOUD_DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    let count = 0;
    for (const [date, entries] of Object.entries(data)) {
      if (!localStorage.getItem('exam_tracker_' + date)) {
        localStorage.setItem('exam_tracker_' + date, JSON.stringify(entries));
        count += entries.length;
      }
    }
    if (count > 0) {
      const el = document.getElementById('importMsg');
      if (el) el.innerHTML = '<span style="color:#00b894">☁️ 已同步 ' + count + ' 条云端记录</span>';
    }
    renderTracker();
    renderProgressBars();
  } catch(e) { console.log('Cloud sync unavailable'); }
}

async function syncToCloud() {
  try {
    // 1. Collect all exam_tracker_* data from localStorage
    const payload = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key || !key.startsWith('exam_tracker_')) continue;
      const date = key.replace('exam_tracker_', '');
      try {
        const entries = JSON.parse(localStorage.getItem(key));
        if (Array.isArray(entries) && entries.length > 0) {
          payload[date] = entries;
        }
      } catch {}
    }

    if (Object.keys(payload).length === 0) return;

    const token = getGhToken();
    if (!token) { console.log('No token set - sync skipped'); return; }

    // 2. Get current file SHA
    const shaRes = await fetch(GH_API_FILE, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!shaRes.ok) throw new Error('GET sha failed: ' + shaRes.status);
    const shaData = await shaRes.json();

    // 3. Push merged data
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    const putRes = await fetch(GH_API_FILE, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        message: 'auto-sync study tracker',
        content: content,
        sha: shaData.sha,
      })
    });
    if (!putRes.ok) throw new Error('PUT failed: ' + putRes.status + ' ' + (await putRes.text()).slice(0,100));
    console.log('Sync OK: ' + Object.keys(payload).length + ' days pushed');
  } catch(e) { console.log('Sync error:', e); }
}

// ─── Init ──────────────────────────────────────
function init() {
  updateHeader();
  renderPhaseBar();
  renderCalendar();
  renderKeyDates();
  renderTracker();
  renderProgressBars();
  // Token setup - ask on first visit
  if (!localStorage.getItem('gh_token')) {
    const token = prompt('🔑 请输入 GitHub Token 以开启自动同步\n(首次配置，仅需一次)');
    if (token && token.trim()) {
      localStorage.setItem('gh_token', token.trim());
      syncToCloud();
    }
  }
}
init();
loadCloudData();

// ─── TOEIC Plan Modal ──
function openToeicPlan() {
  document.getElementById('toeicModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeToeicPlan() {
  document.getElementById('toeicModal').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('toeicModal').addEventListener('click', function(e) {
    if (e.target === this) closeToeicPlan();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeToeicPlan();
  });
});
</script>
